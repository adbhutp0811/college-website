{% extends 'base.html' %}
{% block title %}Apply for Leave{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-calendar-check"></i> Apply for Leave</h4>
    <a href="{% url 'leave_management:my_leaves' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> My Leaves</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Submit</button>
        </form>
    </div>
</div>
{% endblock %}
