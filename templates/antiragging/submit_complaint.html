{% extends 'base.html' %}
{% block title %}Report Ragging{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-megaphone"></i> Report an Incident</h4>
    <a href="{% url 'antiragging:home' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Category</label>
            <select name="category" class="form-select" required>
                <option value="">Select...</option>
                <option value="ragging">Ragging Incident</option>
                <option value="harassment">Harassment</option>
                <option value="discrimination">Discrimination</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Subject</label><input type="text" name="subject" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="5" required></textarea></div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="is_anonymous" id="anon">
            <label class="form-check-label" for="anon">Submit Anonymously</label>
        </div>
        <button type="submit" class="btn btn-danger"><i class="bi bi-send"></i> Submit Report</button>
    </form>
</div></div>
{% endblock %}
