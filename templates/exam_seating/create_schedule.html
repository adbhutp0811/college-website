{% extends 'base.html' %}
{% block title %}Create Schedule{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-plus-circle"></i> Create Exam Schedule</h4>
    <a href="{% url 'exam_seating:schedule_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Exam</label><select name="exam" class="form-select" required>{% for e in exams %}<option value="{{ e.pk }}">{{ e.name }} ({{ e.student_class }})</option>{% endfor %}</select></div>
        <div class="mb-3"><label class="form-label">Subject</label><select name="subject" class="form-select" required>{% for sub in subjects %}<option value="{{ sub.pk }}">{{ sub.name }} ({{ sub.code }})</option>{% endfor %}</select></div>
        <div class="row g-3 mb-3">
            <div class="col-md-4"><label class="form-label">Date</label><input type="date" name="exam_date" class="form-control" required></div>
            <div class="col-md-4"><label class="form-label">Start Time</label><input type="time" name="start_time" class="form-control" required></div>
            <div class="col-md-4"><label class="form-label">End Time</label><input type="time" name="end_time" class="form-control" required></div>
        </div>
        <div class="mb-3"><label class="form-label">Room</label><input type="text" name="room" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Create</button>
    </form>
</div></div>
{% endblock %}
