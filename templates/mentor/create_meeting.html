{% extends 'base.html' %}
{% block title %}Log Meeting{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-plus-circle"></i> Log Mentor Meeting</h4>
    <a href="{% url 'mentor:meetings' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Meeting Date</label><input type="date" name="meeting_date" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Attendees</label><div class="row">{% for s in mentees %}
            <div class="col-md-4"><div class="form-check"><input class="form-check-input" type="checkbox" name="students" value="{{ s.pk }}" id="s{{ s.pk }}"><label class="form-check-label" for="s{{ s.pk }}">{{ s.full_name }} ({{ s.roll_number }})</label></div></div>
        {% empty %}<p class="text-muted">No mentees assigned.</p>{% endfor %}</div></div>
        <div class="mb-3"><label class="form-label">Meeting Notes</label><textarea name="notes" class="form-control" rows="4" required></textarea></div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Meeting</button>
    </form>
</div></div>
{% endblock %}
