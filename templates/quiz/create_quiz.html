{% extends 'base.html' %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-plus-circle"></i> Create Quiz</h4>
    <a href="{% url 'quiz:quiz_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Title</label><input type="text" name="title" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2"></textarea></div>
        <div class="mb-3"><label class="form-label">Subject</label><select name="subject" class="form-select" required>{% for sub in subjects %}<option value="{{ sub.pk }}">{{ sub.name }} ({{ sub.code }})</option>{% endfor %}</select></div>
        <div class="row g-3 mb-3">
            <div class="col-md-3"><label class="form-label">Duration (min)</label><input type="number" name="duration_minutes" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Total Marks</label><input type="number" name="total_marks" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Pass Marks</label><input type="number" name="pass_marks" class="form-control" value="0"></div>
            <div class="col-md-3"><label class="form-label">Questions</label><input type="text" class="form-control" value="Add after creation" disabled></div>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-6"><label class="form-label">Start Time</label><input type="datetime-local" name="start_time" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">End Time</label><input type="datetime-local" name="end_time" class="form-control" required></div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Create Quiz</button>
    </form>
</div></div>
{% endblock %}
