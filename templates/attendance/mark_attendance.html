{% extends 'base.html' %}
{% load static %}
{% block title %}Mark Attendance{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-calendar-check"></i> Mark Attendance</h4>
</div>

<div class="card">
    <div class="card-body">
        <div class="row g-2 mb-4">
            <div class="col-md-4">
                <label class="form-label">Branch</label>
                <select id="classSelect" class="form-select">
                    <option value="">Select Branch</option>
                    {% for c in classes %}
                    <option value="{{ c.id }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Date</label>
                <input type="date" id="dateInput" class="form-control" value="{% now 'Y-m-d' %}">
            </div>
            <div class="col-md-2">
                <label class="form-label">&nbsp;</label>
                <button id="loadStudentsBtn" class="btn btn-primary w-100"><i class="bi bi-search"></i> Load</button>
            </div>
        </div>

        <form id="attendanceForm" method="post" action="{% url 'attendance:save' %}">
            {% csrf_token %}
            <input type="hidden" name="class_id" id="classIdInput">
            <input type="hidden" name="date" id="dateHiddenInput">
            <div id="studentsContainer" class="attendance-grid"></div>
            <div id="submitSection" class="mt-3" style="display:none;">
                <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Save Attendance</button>
            </div>
        </form>

        <div id="loadingIndicator" class="text-center py-4" style="display:none;">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Loading students...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    $('#loadStudentsBtn').click(function() {
        var classId = $('#classSelect').val();
        var date = $('#dateInput').val();
        if (!classId || !date) { alert('Please Select Branch and date'); return; }
        $('#classIdInput').val(classId);
        $('#dateHiddenInput').val(date);
        $('#loadingIndicator').show();
        $('#studentsContainer').empty();
        $('#submitSection').hide();
        $.get('/attendance/api/get-students/' + classId + '/', {date: date}, function(data) {
            $('#loadingIndicator').hide();
            var html = '';
            $.each(data.students, function(i, s) {
                html += '<div class="attendance-card">';
                html += '<div class="d-flex align-items-center gap-2 mb-2">';
                html += '<strong>' + s.name + '</strong>';
                html += '<span class="text-muted small">(' + s.roll + ')</span>';
                html += '</div>';
                html += '<select name="status_' + s.id + '" class="form-select form-select-sm">';
                html += '<option value="present" ' + (s.status === 'present' ? 'selected' : '') + '>Present</option>';
                html += '<option value="absent" ' + (s.status === 'absent' ? 'selected' : '') + '>Absent</option>';
                html += '<option value="late" ' + (s.status === 'late' ? 'selected' : '') + '>Late</option>';
                html += '<option value="leave" ' + (s.status === 'leave' ? 'selected' : '') + '>Leave</option>';
                html += '</select></div>';
            });
            $('#studentsContainer').html(html);
            $('#submitSection').show();
        });
    });
});
</script>
{% endblock %}
