{% extends 'base.html' %}
{% block title %}Sports{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-trophy"></i> Sports</h4>
</div>
<div class="row g-3">{% for sport in sports %}
    <div class="col-md-4"><div class="card h-100">
        <div class="card-body text-center">
            <i class="bi bi-{% if sport.category == 'team' %}people{% else %}person{% endif %}-fill text-primary" style="font-size:3rem"></i>
            <h5 class="mt-2">{{ sport.name }}</h5>
            <span class="badge bg-{% if sport.category == 'team' %}info{% else %}warning{% endif %} mb-2">{{ sport.get_category_display }}</span>
            <p class="text-muted small">{{ sport.description|truncatewords:15 }}</p>
            <a href="{% url 'sports:sport_detail' sport.pk %}" class="btn btn-outline-primary btn-sm w-100">View Details</a>
        </div>
    </div></div>{% empty %}<div class="col-12"><p class="text-muted text-center py-5">No sports available.</p></div>{% endfor %}
</div>
{% endblock %}
