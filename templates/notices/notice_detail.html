<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ notice.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{font-family:'Inter',sans-serif;}
        :root{--primary:#0b1d3a;--accent:#c62828;}
        .page-header{background:linear-gradient(135deg,#0b1d3a,#1a3a6b);color:#fff;padding:50px 0 40px;}
        .page-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),#ff6b35);}
        .nav-link-main{color:#333!important;font-weight:500;padding:1.2rem 0.9rem!important;font-size:0.88rem;transition:all 0.2s;border-bottom:3px solid transparent;text-decoration:none;}
        .nav-link-main:hover,.nav-link-main.active{color:var(--primary)!important;border-bottom-color:var(--accent);}
    </style>
</head>
<body>
<nav style="background:#fff;box-shadow:0 2px 15px rgba(0,0,0,0.06);">
    <div class="container d-flex justify-content-between align-items-center" style="padding:8px 0;">
        <a href="/" style="font-weight:800;color:var(--primary);text-decoration:none;font-size:1.1rem;"><i class="bi bi-mortarboard-fill me-2" style="color:var(--accent);"></i>Miracle Institute</a>
        <div><a href="/" class="nav-link-main d-inline-block">Home</a><a href="{% url 'notices:notice_list' %}" class="nav-link-main d-inline-block">Notices</a></div>
    </div>
</nav>
<div class="page-header">
    <div class="container">
        <span class="badge bg-light text-dark mb-2">{{ notice.get_category_display }}</span>
        <h1 class="fw-bold display-5">{{ notice.title }}</h1>
        <p class="mb-0 opacity-75">Posted on {{ notice.created_at|date:"l, d F Y" }}</p>
    </div>
</div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <p style="line-height:1.9;">{{ notice.content|linebreaks }}</p>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="{% url 'notices:notice_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back to Notices</a>
            </div>
        </div>
    </div>
</div>
<footer style="background:var(--primary);color:rgba(255,255,255,0.7);padding:20px 0;margin-top:30px;">
    <div class="container text-center small">&copy; 2026 Miracle Institute of Technology</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
