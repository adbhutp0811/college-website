{% extends 'base.html' %}
{% block title %}Submit Complaint{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-plus-circle"></i> Submit Mess Complaint</h4>
    <a href="{% url 'mess:complaints' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Category</label>
            <select name="category" class="form-select" required>
                <option value="">Select...</option>
                <option value="food_quality">Food Quality</option>
                <option value="hygiene">Hygiene</option>
                <option value="service">Service</option>
                <option value="menu">Menu Suggestion</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Subject</label><input type="text" name="subject" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="4" required></textarea></div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Submit</button>
    </form>
</div></div>
{% endblock %}
