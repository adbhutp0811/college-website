{% extends 'base.html' %}
{% block title %}Submit Grievance{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-megaphone"></i> Submit Grievance</h4>
    <a href="{% url 'grievances:list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> My Grievances</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Submit</button>
        </form>
    </div>
</div>
{% endblock %}
