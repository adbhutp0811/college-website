{% extends 'base.html' %}
{% load static %}
{% block title %}Student Login - Student Management System{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card card p-4 shadow">
        <div class="text-center mb-4">
            <i class="bi bi-person-circle text-success" style="font-size: 3rem;"></i>
            <h3 class="mt-2">Student Portal</h3>
            <p class="text-muted">Login with your Roll Number & Date of Birth</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Roll Number</label>
                <input type="text" name="roll_number" class="form-control" placeholder="Enter roll number" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="date_of_birth" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 mb-2">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
            <div class="text-center">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none small">
                    <i class="bi bi-shield-lock"></i> Staff Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
