{% extends 'base.html' %}
{% block title %}Delete {{ obj_type }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                <h4 class="mt-3">Delete {{ obj_type }}</h4>
                <p class="text-muted">Are you sure you want to delete <strong>{{ obj_name }}</strong>?</p>
                <p class="text-danger small">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <a href="{{ cancel_url }}" class="btn btn-secondary"><i class="bi bi-x-lg"></i> Cancel</a>
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
