services:
  - type: web
    name: student-management-system
    runtime: python
    plan: free
    buildCommand: './build.sh'
    startCommand: 'gunicorn student_management.wsgi --preload --workers 4 --timeout 120 --access-logfile - --error-logfile -'
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: student_management.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: 'False'
      - key: DJANGO_ALLOWED_HOSTS
        value: '.onrender.com,127.0.0.1,localhost'
      - key: DATABASE_URL
        fromDatabase:
          name: student-management-db
          property: connectionString
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend

databases:
  - name: student-management-db
    plan: free
    databaseName: student_management
    ipAllowList: []
